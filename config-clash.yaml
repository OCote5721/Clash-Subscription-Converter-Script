      - "⚖负载均衡"

  - name: "🎮Steam"
    type: select
    proxies:
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"
      - DIRECT

  - name: "✈️Telegram"
    type: select
    proxies:
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"

  - name: "🎶TikTok"
    type: select
    proxies:
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"

  - name: "⚖负载均衡"
    type: load-balance
    proxies:
    url: "https://cp.cloudflare.com"
    interval: 180
    lazy: true
    strategy: consistent-hashing

  - name: "♾️自动选择"
    type: url-test
    proxies:
    url: "https://cp.cloudflare.com"
    interval: 180
    lazy: false

