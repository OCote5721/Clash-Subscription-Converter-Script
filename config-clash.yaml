    proxies:
      - DIRECT
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"

  - name: "🎙️Discord"
    type: select
    proxies:
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"

  - name: "☁️GoogleFCM"
    type: select
    proxies:
      - "🌏️主代理"
      - "♾️自动选择"
      - "⚖负载均衡"

  - name: "📽️Netflix"
    type: select
    proxies:
