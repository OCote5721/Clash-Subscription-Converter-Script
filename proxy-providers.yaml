proxy-providers:
  provider-1:
    type: http
# ==============================
# 填写这两个参数
    url: ""
    path: ./proxies/.yaml
    interval: 86400
# ============================== 
    override:
      proxy-name:
        # 如果你的机场节点本身可能自带 emoji，为了防止叠加成 "🇭🇰 🇭🇰 香港"，可以先统一清理句首的常见 emoji 和空格（可选）
        - pattern: "^[🇭🇰🇯🇵🇰🇷🇸🇬🇹🇼🇺🇸🇬🇧🇩🇪🇫🇷🇨🇦🇦🇺🇨🇳]+\\s*"
          target: ""
        
        # 将匹配到的节点名整体捕获为 $1，并在开头加上对应的国旗
        - pattern: '^(.*(🇭🇰|HK|Hong.*Kong|香港).*)$'
          target: '🇭🇰 $1'
        - pattern: '^(.*(🇯🇵|JP|Japan|日本|东京|大阪).*)$'
          target: '🇯🇵 $1'
        - pattern: '^(.*(🇰🇷|KR|Korea|韩国|首尔).*)$'
          target: '🇰🇷 $1'
        - pattern: '^(.*(🇸🇬|SG|Singapore|新加坡|狮城).*)$'
          target: '🇸🇬 $1'
        - pattern: '^(.*(🇹🇼|TW|Taiwan|台湾|新北|彰化|台北).*)$'
          target: '🇹🇼 $1'
        - pattern: '^(.*(🇺🇸|US|America|United.*States|美国|洛杉矶|硅谷|西雅图|凤凰城|圣何塞).*)$'
          target: '🇺🇸 $1'
        - pattern: '^(.*(🇬🇧|UK|Britain|United.*Kingdom|英国|伦敦).*)$'
          target: '🇬🇧 $1'
        - pattern: '^(.*(🇩🇪|DE|Germany|德国|法兰克福).*)$'
          target: '🇩🇪 $1'
        - pattern: '^(.*(🇫🇷|FR|France|法国|巴黎).*)$'
          target: '🇫🇷 $1'
        - pattern: '^(.*(🇨🇦|CA|Canada|加拿大).*)$'
          target: '🇨🇦 $1'
        - pattern: '^(.*(🇦🇺|AU|Australia|澳大利亚|悉尼).*)$'
          target: '🇦🇺 $1'

